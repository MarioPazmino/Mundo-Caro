<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta de Palabras y Fotos | Experiencia 3D</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="stars-container"></div>
    <div id="scene-container"></div>

    <div class="ui-overlay">
        <p>Te quiero mucho MOR</p>
    </div>

    <!-- Content Modal -->
    <div id="content-modal" class="modal hidden">
        <span class="close-btn" id="close-modal">&times;</span>
        <img id="modal-image" src="" alt="Imagen ampliada" class="hidden">
        <video id="modal-video" class="hidden" controls autoplay playsinline>
            <source id="modal-video-src" src="" type="video/mp4">
        </video>
        <div id="modal-text" class="hidden"></div>
    </div>

    <!-- Music Player -->
    <div id="music-player">
        <button id="music-btn" title="Reproducir música">🎵</button>
        <span id="music-label">Música</span>
        <audio id="bg-audio" loop></audio>
    </div>

    <!-- Three.js Global Version (No Modules) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- CSS3DRenderer Global Version -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>

    <script src="script.js"></script>
</body>

</html>
